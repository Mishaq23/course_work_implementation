defaults:
  - model: baseline
  - writer: wandb
  - metrics: example
  - datasets: fakeavceleb
  - dataloader: av
  - transforms: example
  - _self_

dataset_root: ???
index_dir: ./data/indices/fakeavceleb
num_frames: 16

optimizer:
  _target_: torch.optim.Adam
  lr: 3e-4

lr_scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  gamma: 0.9
  step_size: ${trainer.epoch_len}

loss_function:
  _target_: src.loss.ExampleLoss

trainer:
  log_step: 50
  n_epochs: 100
  epoch_len: 500
  device_tensors: ["video", "audio", "labels"]
  resume_from: null
  device: auto
  override: False
  monitor: "max test_MulticlassAccuracy"
  save_period: 5
  early_stop: ${trainer.n_epochs}
  save_dir: "saved"
  seed: 1