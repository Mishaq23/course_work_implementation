defaults:
  - model: av_baseline_model
  - writer: dummy
  - metrics: example
  - datasets: fakeavceleb
  - dataloader: av
  - transforms: av_identity
  - _self_

dataset_root: ???
index_dir: ./data/indices/fakeavceleb
num_frames: 16
video_size: 224
features_root: ???
audio_feature_dim: 1024
video_feature_dim: 768

optimizer:
  _target_: torch.optim.Adam
  lr: 3e-4

lr_scheduler:
  _target_: torch.optim.lr_scheduler.StepLR
  gamma: 0.9
  step_size: ${trainer.epoch_len}

loss_function:
  _target_: src.loss.BCELoss
  pos_weight: null

trainer:
  log_step: 50
  n_epochs: 100
  epoch_len: 500
  device_tensors: ["video", "audio", "labels"]
  resume_from: null
  from_pretrained: null
  freeze_modules: null
  device: auto
  override: False
  monitor: "max val_AUROC"
  save_period: 5
  early_stop: ${trainer.n_epochs}
  save_dir: "saved"
  seed: 1
