defaults:
  - baseline
  - override /model: video_only_model
  - override /datasets: features_train_val
  - _self_

writer:
  run_name: video_pretrain

datasets:
  train:
    label_mode: video_fake
  val:
    label_mode: video_fake

trainer:
  device_tensors: ["video", "labels"]
  use_weighted_sampler: true
  monitor: "max val_AUROC"
